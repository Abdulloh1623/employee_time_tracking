# Full stack: PostgreSQL + Spring Boot backend + React (nginx) web.
# Usage:  docker compose -f docker-compose.full.yml up --build
# Web:    http://localhost:8088      API (proxied): http://localhost:8088/api/v1
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: timegate
      POSTGRES_USER: timegate
      POSTGRES_PASSWORD: timegate
    volumes:
      - timegate_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U timegate -d timegate"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DB_URL: jdbc:postgresql://db:5432/timegate
      DB_USER: timegate
      DB_PASSWORD: timegate
      JWT_SECRET: change-me-in-production-please-use-a-long-random-secret-key
      CORS_ORIGINS: http://localhost:8088
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"     # direct API access (optional)

  web:
    build: ./web
    depends_on:
      - backend
    ports:
      - "8088:80"

volumes:
  timegate_pgdata:
