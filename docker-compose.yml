services:
  db:
    image: postgres:16-alpine
    container_name: timegate-db
    environment:
      POSTGRES_DB: timegate
      POSTGRES_USER: timegate
      POSTGRES_PASSWORD: timegate
    ports:
      - "5432:5432"
    volumes:
      - timegate_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U timegate -d timegate"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Optional: database admin UI at http://localhost:8081
  adminer:
    image: adminer:latest
    container_name: timegate-adminer
    ports:
      - "8081:8080"
    depends_on:
      - db

volumes:
  timegate_pgdata:
