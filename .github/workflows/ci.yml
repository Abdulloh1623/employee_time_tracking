name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend-tests:
    name: Backend (JUnit + Testcontainers)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Make mvnw executable
        run: chmod +x ./mvnw

      # Docker is preinstalled on ubuntu runners, so Testcontainers works out of the box.
      - name: Build and run tests (unit + integration)
        run: ./mvnw -B verify

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-surefire-reports
          path: |
            backend/target/surefire-reports/
            backend/target/failsafe-reports/
          if-no-files-found: ignore

  frontend-tests:
    name: Frontend (Vitest + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test

      - name: Production build
        run: npm run build

  docker-build:
    name: Docker images build
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t timegate-backend:ci ./backend

      - name: Build web image
        run: docker build -t timegate-web:ci ./web
